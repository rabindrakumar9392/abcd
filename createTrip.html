<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Trip</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="trip-form-container">

        <div class="trip-form">

            <h2>Create New Trip</h2>

            <input type="text" id="tripName" placeholder="Trip Name">

            <input type="text" id="destination" placeholder="Destination">

            <label>Start Date</label>
            <input type="date" id="startDate">

            <label>End Date</label>
            <input type="date" id="endDate">

            <input type="number" id="budget" placeholder="Budget">

            <textarea id="description" placeholder="Trip Description"></textarea>

            <button id="createTripBtn">
                Save Trip
            </button>
            <a href="itinerary.html">
                <button>
                    Go To Itinerary
                </button>
            </a>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>

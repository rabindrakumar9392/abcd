<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Traveloop</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="dashboard">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <h2>Traveloop</h2>

            <ul>
                <li>Dashboard</li>
                <li>My Trips</li>
                <li>Create Trip</li>
                <li>Budget</li>
                <li>Profile</li>
            </ul>

        </div>

        <!-- MAIN CONTENT -->

        <div class="main-content">

            <div class="topbar">

                <h1>Welcome Back 👋</h1>
                <a href="createTrip.html">
                    <button>Create Trip</button>
                </a>



            </div>

            <!-- TRIP CARDS -->

            <div class="trip-container">

                <div class="trip-card">

                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e" alt="">

                    <h3>Goa Adventure</h3>

                    <p>4 Days Trip</p>

                    <span>Budget: ₹20,000</span>

                </div>

                <div class="trip-card">

                    <img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98" alt="">

                    <h3>Manali Escape</h3>

                    <p>6 Days Trip</p>

                    <span>Budget: ₹35,000</span>

                </div>

                <div class="trip-card">

                    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" alt="">

                    <h3>Kerala Tour</h3>
                    <p>5 Days Trip</p>

                    <span>Budget: ₹28,000</span>

                </div>

            </div>

        </div>

    </div>

</body>

</html>
